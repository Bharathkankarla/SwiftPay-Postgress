apiVersion: apps/v1
kind: Deployment
metadata:
  name: swiftpay-redis
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swiftpay-redis
  template:
    metadata:
      labels:
        app: swiftpay-redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: swiftpay-redis
  namespace: default
spec:
  selector:
    app: swiftpay-redis
  ports:
    - port: 6379
      targetPort: 6379
