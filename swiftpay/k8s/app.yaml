apiVersion: apps/v1
kind: Deployment
metadata:
  name: swiftpay-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swiftpay-app
  template:
    metadata:
      labels:
        app: swiftpay-app
    spec:
      containers:
        - name: swiftpay
          image: swiftpay:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          envFrom:
            - configMapRef:
                name: swiftpay-config
            - secretRef:
                name: swiftpay-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: swiftpay-app
  namespace: default
spec:
  selector:
    app: swiftpay-app
  type: NodePort
  ports:
    - port: 8085
      targetPort: 8085
      nodePort: 30085
