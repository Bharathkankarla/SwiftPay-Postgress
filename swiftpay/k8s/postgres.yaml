apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: swiftpay-postgres
  namespace: default
spec:
  serviceName: swiftpay-postgres
  replicas: 1
  selector:
    matchLabels:
      app: swiftpay-postgres
  template:
    metadata:
      labels:
        app: swiftpay-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: swiftpay
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: swiftpay-secret
                  key: SPRING_DATASOURCE_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: swiftpay-secret
                  key: SPRING_DATASOURCE_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "admin", "-d", "swiftpay"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: swiftpay-postgres
  namespace: default
spec:
  selector:
    app: swiftpay-postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
