apiVersion: apps/v1
kind: Deployment
metadata:
  name: swiftpay-zookeeper
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swiftpay-zookeeper
  template:
    metadata:
      labels:
        app: swiftpay-zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.4.0
          ports:
            - containerPort: 2181
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
---
apiVersion: v1
kind: Service
metadata:
  name: swiftpay-zookeeper
  namespace: default
spec:
  selector:
    app: swiftpay-zookeeper
  ports:
    - port: 2181
      targetPort: 2181
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: swiftpay-kafka
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swiftpay-kafka
  template:
    metadata:
      labels:
        app: swiftpay-kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.4.0
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "swiftpay-zookeeper:2181"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://swiftpay-kafka:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "kafka-topics --bootstrap-server localhost:9092 --list"
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: swiftpay-kafka
  namespace: default
spec:
  selector:
    app: swiftpay-kafka
  ports:
    - port: 9092
      targetPort: 9092
