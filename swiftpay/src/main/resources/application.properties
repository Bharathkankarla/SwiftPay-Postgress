
spring.application.name=transaction-gateway
server.port=8085

spring.datasource.url=jdbc:postgresql://localhost:5433/swiftpay?options=-c%20TimeZone%3DUTC
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=false


spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.group-id=ledger-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.swiftpay.event.PaymentInitiatedEvent
spring.kafka.listener.missing-topics-fatal=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.root=INFO
logging.level.com.swiftpay=DEBUG
logging.level.org.hibernate.SQL=DEBUG

swiftpay.kafka.topics.payment-initiated=payment.initiated
swiftpay.kafka.topics.payment-result=payment.result
swiftpay.demo.seed-users=true
swiftpay.jwt.secret=U3dpZnRQYXlEZW1vSldUU2VjcmV0S2V5Rm9ySGFja2F0aG9uMjAyNg==
swiftpay.jwt.expiration-seconds=3600
