spring.datasource.url=jdbc:h2:mem:swiftpay-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=false

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false
spring.kafka.admin.auto-create=false
spring.kafka.listener.missing-topics-fatal=false

swiftpay.demo.seed-users=false
swiftpay.jwt.secret=U3dpZnRQYXlUZXN0SldUU2VjcmV0S2V5Rm9ySGFja2F0aG9uMjAyNg==
swiftpay.jwt.expiration-seconds=3600
