name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run tests
        run: mvn -B test

      - name: Build package
        run: mvn -B -DskipTests package

      - name: Build Docker image
        run: docker build -t swiftpay:${{ github.sha }} .
